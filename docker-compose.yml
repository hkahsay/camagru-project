x-php-environment: &php-environment
  DB_HOST: ${DB_HOST:-mysql}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:-camagru}
  DB_USER: ${DB_USER:-camagru}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_CHARSET: ${DB_CHARSET:-utf8mb4}

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    image: camagru-php
    build:
      context: .
      dockerfile: Dockerfile
    environment: *php-environment
    volumes:
      - ./:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      setup:
        condition: service_completed_successfully

  setup:
    image: camagru-php
    build:
      context: .
      dockerfile: Dockerfile
    command: php config/setup.php
    environment: *php-environment
    volumes:
      - ./:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-camagru}
      MYSQL_USER: ${DB_USER:-camagru}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  app_storage:
  mysql_data:
