x-php-environment: &php-environment
  DB_HOST: ${DB_HOST:-mysql}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:-camagru}
  DB_USER: ${DB_USER:-camagru}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_CHARSET: ${DB_CHARSET:-utf8mb4}
  APP_URL: ${APP_URL:-http://localhost:8080}
  MAIL_DRIVER: ${MAIL_DRIVER:-log}
  SMTP_HOST: ${SMTP_HOST:-mailpit}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-}
  MAIL_FROM: ${MAIL_FROM:-no-reply@camagru.local}

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    image: camagru-php
    build:
      context: .
      dockerfile: Dockerfile
    environment: *php-environment
    volumes:
      - ./:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      setup:
        condition: service_completed_successfully

  setup:
    image: camagru-php
    build:
      context: .
      dockerfile: Dockerfile
    command: php config/setup.php
    environment: *php-environment
    volumes:
      - ./:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-camagru}
      MYSQL_USER: ${DB_USER:-camagru}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "${MAILPIT_HOST_PORT:-8025}:8025"

volumes:
  app_storage:
  mysql_data:
